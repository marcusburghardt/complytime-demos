---
- name: "Populate Demo VM with compliance policies via mock-oci-registry"
  hosts: demo_vm
  become: false
  vars:
    complyctl_workdir: "~/complyctl-demo"
    registry_url: "http://localhost:8765"
    openscap_policy_id: "cis-fedora"
    openscap_profile: "cis_workstation_l1"
    ampel_policy_id: "ampel-bp"
    ampel_repositories:
      - url: "https://github.com/complytime/complytime-demos"
        branches: ["main"]
        specs: ["builtin:github/branch-rules.yaml"]

  tasks:
    - name: "Create working directory for complyctl demo"
      ansible.builtin.file:
        path: "{{ complyctl_workdir }}"
        state: directory
        mode: "0750"

    - name: "Create complytime.yaml configuration"
      ansible.builtin.template:
        src: complytime.yaml.j2
        dest: "{{ complyctl_workdir }}/complytime.yaml"
        mode: "0640"

    - name: "Start mock-oci-registry as a background process"
      ansible.builtin.shell:
        cmd: "nohup ~/bin/mock-oci-registry &"
      async: 10
      poll: 0

    - name: "Wait for mock-oci-registry to be ready"
      ansible.builtin.uri:
        url: "{{ registry_url }}/v2/"
        method: GET
        status_code: 200
      register: registry_health
      retries: 10
      delay: 2
      until: registry_health.status == 200

    - name: "Fetch policies with complyctl get"
      ansible.builtin.command:
        cmd: "~/bin/complyctl get"
        chdir: "{{ complyctl_workdir }}"

    - name: "Validate OpenSCAP policy is available"
      ansible.builtin.shell:
        cmd: "~/bin/complyctl list | grep -q '{{ openscap_policy_id }}'"
        chdir: "{{ complyctl_workdir }}"
      register: result_openscap
      changed_when: false
      failed_when: result_openscap.rc != 0

    - name: "Validate AMPEL policy is available"
      ansible.builtin.shell:
        cmd: "~/bin/complyctl list | grep -q '{{ ampel_policy_id }}'"
        chdir: "{{ complyctl_workdir }}"
      register: result_ampel
      changed_when: false
      failed_when: result_ampel.rc != 0

    # --- AMPEL plugin workspace setup ---

    - name: "Create AMPEL policy directory"
      ansible.builtin.file:
        path: "{{ complyctl_workdir }}/.complytime/ampel/policy"
        state: directory
        mode: "0750"

    - name: "Copy AMPEL granular policy files"
      ansible.builtin.copy:
        src: "files/ampel-policies/"
        dest: "{{ complyctl_workdir }}/.complytime/ampel/policy/"
        mode: "0644"

    - name: "Create AMPEL targets configuration"
      ansible.builtin.template:
        src: ampel-targets.yaml.j2
        dest: "{{ complyctl_workdir }}/.complytime/ampel/ampel-targets.yaml"
        mode: "0640"

    - name: "Run complyctl doctor for workspace health check"
      ansible.builtin.command:
        cmd: "~/bin/complyctl doctor"
        chdir: "{{ complyctl_workdir }}"
      register: result_doctor
      changed_when: false
...
