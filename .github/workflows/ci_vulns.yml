name: Vulnerabilities Check

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  actions: none
  id-token: none
  security-events: none
  packages: none

jobs:
  call_reusable_vuln_scan:
    name: OSV-Scanner
    permissions:
      contents: read
      actions: read           # Needed to upload SARIF file to CodeQL. See: https://github.com/github/codeql-action/issues/2117
      security-events: write  # Needed to upload the results to code-scanning dashboard.
      id-token: write         # Required for OIDC token generation (trivy_image job)
      packages: write         # Required for reusable workflow validation (trivy_image job)
    uses: complytime/org-infra/.github/workflows/reusable_vuln_scan.yml@main
